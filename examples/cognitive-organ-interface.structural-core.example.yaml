schema_version: "0.2"

interface_id: cognitive-organ-interface-structural-core-v0.2

organ_id: structural-core-main

organ_type: structural_core

role:
  summary: >
    Integrates semantic structures, memory context, analysis outputs,
    conflicts, and uncertainty into one inspectable structural representation.

  responsibilities:
    - Merge compatible semantic structures.
    - Detect conflicts between cognitive artifacts.
    - Preserve unresolved uncertainty.
    - Assign structural priorities.
    - Produce an integrated structure for verification and recomposition.

  non_responsibilities:
    - Perform unrestricted external search.
    - Make final human decisions.
    - Hide unresolved conflicts.
    - Rewrite integrated meaning solely for stylistic convenience.

consumes:
  - artifact_type: SemanticStructure
    required: true
    description: >
      Explicit semantic structure produced by the Yin Semantic Decomposer.

  - artifact_type: ContextFrame
    required: false
    description: >
      Relevant contextual memory selected by Memory Breathing.

  - artifact_type: AnalysisGraph
    required: true
    description: >
      Structured analysis generated by the Analyst organ.

  - artifact_type: HistoryTrace
    required: false
    description: >
      Historical trace required for continuity or comparison.

produces:
  - artifact_type: IntegratedStructure
    required: true
    description: >
      Unified semantic structure generated from compatible inputs.

  - artifact_type: ConflictReport
    required: true
    description: >
      Explicit record of contradictions and unresolved differences.

  - artifact_type: PriorityMap
    required: true
    description: >
      Weighted map of structural importance.

invocation:
  mode: conditional

  preconditions:
    - At least one SemanticStructure is available.
    - At least one AnalysisGraph is available.

  skip_conditions:
    - The cognitive cycle has already been blocked by Human Gate.

  blocking_conditions:
    - Required semantic structure is missing.
    - Required analysis artifact is invalid.

routing:
  allowed_predecessors:
    - yin_semantic_decomposer
    - memory_breathing
    - analyst

  allowed_successors:
    - verifier
    - boundary
    - yang_language_recomposer

  return_routes:
    - analyst
    - memory_breathing

  human_escalation_allowed: true

guarantees:
  must_preserve:
    - source semantic intent
    - explicit uncertainty
    - unresolved conflict markers
    - important constraints
    - trace references

  must_report:
    - semantic conflicts
    - unresolved assumptions
    - missing required artifacts
    - priority decisions

  quality_conditions:
    - No unresolved conflict may be silently removed.
    - Priority weights must include reasons.
    - Structural compression must preserve the question epicenter.

boundaries:
  prohibited_actions:
    - Make irreversible human decisions.
    - Invent missing source evidence.
    - Convert uncertainty into certainty.
    - Suppress conflict without recording it.

  authority_level: interpret

  requires_human_review_for:
    - unresolved high-priority conflicts
    - incompatible safety constraints
    - competing interpretations with equal confidence

observability:
  record_inputs: true
  record_outputs: true
  record_summary: true
  record_uncertainty: true

  trace_fields:
    - input_artifact_refs
    - conflict_ids
    - priority_weights
    - unresolved_items
    - output_artifact_refs

failure_policy:
  on_failure: route_to_verifier

  emit_failure_record: true

  fallback_organ: verifier

  failure_artifact_type: StructuralIntegrationFailure

metadata:
  architecture: ai-cognitive-architecture
  release: v0.2.0-candidate
  layer: structural-integration
