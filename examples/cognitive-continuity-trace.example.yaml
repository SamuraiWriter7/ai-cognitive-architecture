inherited_traces:
  - trace_id: trace-001

    trace_type: question_epicenter

    summary: >
      Can specialized AI systems be organized as cognitive organs
      within one auditable distributed cognitive architecture?

    source_ref: cognitive-cycle-001

    importance: 1.0
    confidence: 0.98

    status: active

    continuity_role: design_seed

    preserve_reason: >
      This question remains the central architectural epicenter
      across all current specification layers.

    related_trace_refs:
      - trace-002
      - trace-003

  - trace_id: trace-002

    trace_type: design_decision

    summary: >
      Structural Translation Core integrates meaning,
      while Human Gate prepares information for human decision.

    source_ref: cognitive-cycle-002

    importance: 0.96
    confidence: 0.97

    status: active

    continuity_role: constraint

    preserve_reason: >
      This separation prevents semantic integration
      from being confused with human decision authority.

    related_trace_refs:
      - trace-001

  - trace_id: trace-003

    trace_type: routing_pattern

    summary: >
      Complex architecture tasks benefit from explicit
      Verifier-to-Structural-Core re-integration.

    source_ref: cognitive-feedback-001

    importance: 0.88
    confidence: 0.91

    status: active

    continuity_role: routing_hint

    preserve_reason: >
      The pattern improved consistency in prior deep-structure routes.

    related_trace_refs:
      - trace-004

  - trace_id: trace-004

    trace_type: feedback_pattern

    summary: >
      Finder activation may be unnecessary when Memory Breathing
