      transformation_type: strengthen

      output_trace_ref: trace-004-v2

      description: >
        Finder over-activation is retained as a monitored routing pattern
        rather than treated as a one-cycle isolated issue.

  dropped_elements:
    - trace_ref: temporary-example-detail-001

      reason: >
        The example-specific wording does not affect future architecture decisions.

      review_status: not_required

