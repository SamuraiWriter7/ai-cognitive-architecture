  - trace_id: trace-005

    trace_type: human_preference

    summary: >
      Prefer explicit structural records before adding
      autonomous implementation complexity.

    source_ref: human-feedback-001

    importance: 0.95
    confidence: 1.0

    status: active

    continuity_role: human_correction

    preserve_reason: >
      Human architectural preference should remain visible
      across future specification cycles.

    related_trace_refs: []

  - trace_id: trace-006

    trace_type: unresolved_conflict

    summary: >
      The architecture uses functional cognitive analogy
