        - cognitive-feedback-002

      importance: 0.89

next_cycle_seed:
  seed_question: >
    How should cognitive traces be weighted, compressed,
    and selectively inherited across long-running cognitive lineages?

  required_context_refs:
    - trace-001
    - trace-002
    - trace-003
    - trace-005
    - trace-006

  open_conflicts:
    - >
      How much historical trace context can be inherited
      before continuity becomes cognitive overload?

    - >
      When should an old trace become dormant rather than remain active?

  priority_targets:
    - trace_weighting
    - trace_compression
    - continuity_budget
    - lineage_auditability

  routing_hints:
    - Activate Memory Breathing.
    - Use Analyst for trace-weight comparison.
    - Use Structural Core for continuity conflict integration.
    - Use Verifier to check trace loss and unsupported inheritance.
    - Send architecture-level changes through Human Gate.

  activation_conditions:
    - >
      Activate Finder only if external comparison or current evidence is required.

    - >
      Activate Boundary if continuity rules affect human authority or retention policy.

continuity_policy:
  max_inherited_traces: 20

  decay_mode: relevance_based

  minimum_importance: 0.65

  preserve_human_corrections: true

  preserve_unresolved_conflicts: true

  require_trace_origin: true

  allow_silent_drop: false

  compression_allowed: true

  review_interval_cycles: 5

human_review:
  required: true

  decision_status: approved

  reasons:
    - >
      The continuity layer determines which structures influence future cognition.
    - >
      Human preferences and unresolved conflicts must not be silently removed.

  reviewed_items:
    - trace-001
    - trace-002
    - trace-005
    - trace-006
    - adaptation-001
    - adaptation-002

continuity_summary: >
  The architecture preserves the central distributed-cognition question,
  the separation between semantic integration and human authority,
  an effective verification re-integration route,
  human preference for explicit structural specification,
  and the unresolved boundary between functional cognition analogy
  and biological equivalence.

  The next cycle should investigate trace weighting,
  compression, continuity budget, and long-lineage auditability.

